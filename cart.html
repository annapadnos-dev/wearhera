<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HERA Cart</title>
  <style>
    :root {
      --bg: #f8f6f2;
      --text: #1f1f1f;
      --card-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    a { color: inherit; text-decoration: none; }

    header {
      background: rgba(255,255,255,0.95);
      padding: 18px 36px;
      border-bottom: 1px solid #ece7e1;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: bold;
      letter-spacing: 2px;
      font-size: 22px;
    }

    .brand img {
      width: 42px;
      height: 42px;
      object-fit: contain;
      border-radius: 50%;
      background: white;
    }

    nav {
      display: flex;
      gap: 18px;
      align-items: center;
    }

    .page {
      max-width: 1000px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .cart-box {
      background: white;
      border-radius: 28px;
      box-shadow: var(--card-shadow);
      padding: 28px;
    }

    h1 {
      margin-top: 0;
      font-size: 40px;
    }

    .cart-item {
      display: grid;
      grid-template-columns: 120px 1fr auto;
      gap: 20px;
      align-items: center;
      padding: 18px 0;
      border-bottom: 1px solid #eee;
    }

    .cart-item img {
      width: 120px;
      height: 120px;
      object-fit: cover;
      border-radius: 16px;
      background: #f5f5f5;
    }

    .cart-item h3 {
      margin: 0 0 8px;
    }

    .muted {
      color: #666;
      line-height: 1.6;
    }

    .price {
      font-weight: bold;
      font-size: 18px;
    }

    .remove-btn, .clear-btn {
      border: none;
      padding: 10px 14px;
      border-radius: 999px;
      cursor: pointer;
      font-weight: bold;
      background: #f2f2f2;
    }

    .summary {
      margin-top: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 14px;
    }

    .total {
      font-size: 24px;
      font-weight: bold;
    }

    .empty {
      color: #666;
      font-size: 18px;
      padding: 20px 0;
    }

    @media (max-width: 700px) {
      .cart-item {
        grid-template-columns: 1fr;
      }

      header {
        padding: 16px 20px;
      }
    }
  </style>
</head>
<body>
  <header>
    <a class="brand" href="index.html">
      <img src="logo.png" alt="HERA logo">
      <span>HERA</span>
    </a>
    <nav>
      <a href="index.html">Home</a>
      <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
    </nav>
  </header>

  <main class="page">
    <div class="cart-box">
      <h1>Your Cart</h1>
      <div id="cart-items"></div>
      <div class="summary">
        <div class="total">Total: $<span id="cart-total">0</span></div>
        <button class="clear-btn" onclick="clearCartAndRender()">Clear Cart</button>
      </div>
    </div>
  </main>

  <script src="cart.js"></script>
  <script>
    function renderCartPage() {
      const items = getCart();
      const cartItemsEl = document.getElementById("cart-items");
      const totalEl = document.getElementById("cart-total");

      cartItemsEl.innerHTML = "";

      if (items.length === 0) {
        cartItemsEl.innerHTML = '<div class="empty">Your cart is empty.</div>';
        totalEl.textContent = "0";
        updateCartCount();
        return;
      }

      let total = 0;

      items.forEach((item, index) => {
        total += item.price * item.qty;

        const row = document.createElement("div");
        row.className = "cart-item";
        row.innerHTML = `
          <img src="${item.image}" alt="${item.name}">
          <div>
            <h3>${item.name}</h3>
            <div class="muted">Color: ${item.color}</div>
            <div class="muted">Size: ${item.size}</div>
            <div class="muted">Quantity: ${item.qty}</div>
          </div>
          <div>
            <div class="price">$${item.price * item.qty}</div>
            <br>
            <button class="remove-btn" onclick="removeItemAndRender(${index})">Remove</button>
          </div>
        `;
        cartItemsEl.appendChild(row);
      });

      totalEl.textContent = total;
      updateCartCount();
    }

    function removeItemAndRender(index) {
      removeFromCart(index);
      renderCartPage();
    }

    function clearCartAndRender() {
      clearCart();
      renderCartPage();
    }

    renderCartPage();
  </script>
</body>
</html>
